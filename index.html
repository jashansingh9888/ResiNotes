<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Tech Jira Note Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .form-section { @apply bg-white p-6 rounded-lg shadow-md mb-6 border-l-4 border-green-500; }
        label { @apply block text-sm font-bold text-gray-700 mb-1; }
        input, select, textarea { @apply w-full p-2 border rounded mb-3 focus:ring-2 focus:ring-green-400 outline-none; }
        .grid-cols-custom { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Field Tech Jira Generator</h1>
            <p class="text-gray-600">Fill in details to generate formatted Jira panels</p>
        </header>

        <div class="form-section">
            <h2 class="text-xl font-bold mb-4 text-green-700">Technician(s)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label>Inside Tech</label>
                    <input type="text" id="tech_inside" value="Jashandeep Singh Sidhu">
                </div>
                <div>
                    <label>Outside Tech</label>
                    <input type="text" id="tech_outside" value="Yuan Tian">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="text-xl font-bold mb-4 text-green-700">Installation Details</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <label class="flex items-center"><input type="checkbox" id="test_ruby" class="mr-2" checked> Ruby 🚨</label>
                <label class="flex items-center"><input type="checkbox" id="test_light" class="mr-2" checked> Light 💡</label>
                <label class="flex items-center"><input type="checkbox" id="test_exfo" class="mr-2" checked> EXFO 📲</label>
                <label class="flex items-center"><input type="checkbox" id="test_wifi" class="mr-2" checked> Wifi 🛜</label>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label>ONT Model</label>
                    <select id="ont_model">
                        <option value="Zhone - 5222XG">Zhone - 5222XG</option>
                        <option value="Nokia XS-010X-R">Nokia XS-010X-R</option>
                    </select>
                </div>
                <div>
                    <label>ONT Location</label>
                    <input type="text" id="ont_loc" placeholder="e.g. Smart Panel">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="text-xl font-bold mb-4 text-green-700">Material QTY</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div><label>5222XG Zhone</label><input type="number" id="mat_1002324" value="1"></div>
                <div><label>Nokia Beacon 19</label><input type="number" id="mat_1002555" value="1"></div>
                <div><label>Fibre Jack</label><input type="number" id="mat_1002322" value="1"></div>
                <div><label>RJ45 Connector</label><input type="number" id="mat_1000289" value="1"></div>
            </div>
        </div>

        <div class="form-section">
            <h2 class="text-xl font-bold mb-4 text-green-700">Fiber & Riser</h2>
            <div class="grid grid-cols-3 gap-4">
                <div><label>Floor</label><input type="text" id="floor"></div>
                <div><label>Panel</label><input type="text" id="panel"></div>
                <div><label>Total Meter (m)</label><input type="text" id="fiber_total"></div>
            </div>
        </div>

        <button onclick="generateJira()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg shadow-lg transition duration-200">
            GENERATE JIRA NOTE
        </button>

        <div class="mt-8">
            <h2 class="text-lg font-bold mb-2">Output (Copy this):</h2>
            <textarea id="jira_output" rows="15" class="w-full p-4 font-mono text-sm bg-gray-900 text-green-400 rounded-lg border-2 border-gray-700" readonly></textarea>
            <button onclick="copyToClipboard()" class="mt-2 bg-blue-600 text-white px-4 py-2 rounded">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        function generateJira() {
            const getVal = (id) => document.getElementById(id).value;
            const getCheck = (id) => document.getElementById(id).checked ? "Yes" : "No";

            let note = `{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Inside: ${getVal('tech_inside')}
Outside: ${getVal('tech_outside')}
{panel}

{panel:title=Tests Completed:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Ruby 🚨: ${getCheck('test_ruby')}
Light 💡: ${getCheck('test_light')}
EXFO 📲: ${getCheck('test_exfo')}
Wifi 🛜: ${getCheck('test_wifi')}
{panel}

{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
*ONT Location*: ${getVal('ont_loc')}
ONT Model: ${getVal('ont_model')}
{panel}

{panel:title=Riser Info:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Floor: ${getVal('floor')}
Panel: ${getVal('panel')}
{panel}

{panel:title=Fibre Meter Mark:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Total = ${getVal('fiber_total')}m
{panel}

{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
h5._Hardware_
|| SAP || Materials || QTY ||
|1002324| 5222XG Zhone |${getVal('mat_1002324')}|
|1002555| Nokia Beacon 19 |${getVal('mat_1002555')}|
h5._Fibre_
|1002322| Fibre Jack |${getVal('mat_1002322')}|
{panel}`;

            document.getElementById('jira_output').value = note;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("jira_output");
            copyText.select();
            document.execCommand("copy");
            alert("Jira note copied!");
        }
    </script>
</body>
</html>
