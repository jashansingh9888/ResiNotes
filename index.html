<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Res Template Note Gen</title>
    <style>
        :root { --jira-blue: #0052cc; --panel-green: #93cc94; --bg: #f4f5f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 10px; color: #172b4d; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #ebecf0; padding-bottom: 10px; color: var(--jira-blue); font-size: 1.2rem; }
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #dfe1e6; border-radius: 5px; }
        .section-title { font-weight: bold; margin-bottom: 10px; display: block; color: #444; text-transform: uppercase; font-size: 0.8rem; }
        label { display: block; margin: 10px 0 5px; font-size: 0.9rem; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #dfe1e6; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { position: sticky; bottom: 10px; background: white; padding: 10px 0; display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .gen-btn { background: var(--jira-blue); color: white; }
        .copy-btn { background: #28a745; color: white; display: none; }
        #output { background: #f9f9f9; border: 1px dashed #ccc; padding: 15px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Residential Installation Note Generator</h2>
    
    <div class="section">
        <span class="section-title">Technician Info</span>
        <input type="text" id="techName" placeholder="Technician Name (Inside/Outside)">
    </div>

    <div class="section">
        <span class="section-title">Tests Completed</span>
        <div class="grid">
            <div><label>Ruby 🚨</label><select id="testRuby"><option value="Yes">Yes</option><option value="No">No</option></select></div>
            <div><label>Light 💡</label><input type="text" id="testLight" placeholder="e.g. -17.5"></div>
            <div><label>Wifi 🛜</label><select id="testWifi"><option value="Yes">Yes</option><option value="No">No</option></select></div>
            <div><label>Pair Test</label><select id="testPair"><option value="Yes">Yes</option><option value="No">No</option></select></div>
        </div>
    </div>

    <div class="section">
        <span class="section-title">Equipment Details</span>
        <label>ONT Model & MAC</label>
        <div class="grid">
            <select id="ontModel">
                <option value="5222XG Zhone">5222XG Zhone</option>
                <option value="2424GN Zhone">2424GN Zhone</option>
                <option value="Nokia XS-010X-R">Nokia XS-010X-R</option>
            </select>
            <input type="text" id="ontMac" placeholder="ONT MAC/SN">
        </div>
        <label>AP Model & MAC</label>
        <div class="grid">
            <select id="apModel">
                <option value="Airties 4960x">Airties 4960x</option>
                <option value="Nokia Beacon 19">Nokia Beacon 19</option>
                <option value="TP LINK AX23">TP LINK AX23</option>
            </select>
            <input type="text" id="apMac" placeholder="AP MAC">
        </div>
    </div>

    <div class="section">
        <span class="section-title">Materials (SAP)</span>
        <label>Quick Search Material:</label>
        <input type="text" id="matSearch" placeholder="Type to filter..." onkeyup="filterMaterials()">
        <select id="matSelect" size="5" style="margin-top:5px;"></select>
    </div>

    <div class="section">
        <span class="section-title">Additional Field Notes</span>
        <textarea id="addNotes" rows="3" placeholder="Riser details, floor info, obstacles..."></textarea>
    </div>

    <div class="btn-group">
        <button class="gen-btn" onclick="generate()">Generate Note</button>
        <button id="copyBtn" class="copy-btn" onclick="copyNote()">Copy to Clipboard</button>
    </div>

    <div id="output"></div>
</div>

<script>
    const materials = [
        {sap: "1002324", name: "5222XG Zhone"}, {sap: "1002327", name: "2424GN Zhone"},
        {sap: "1002322", name: "Fibre Jack"}, {sap: "1000526", name: "Heat Sleeve 40mm"},
        {sap: "1001083", name: "LC APC Connector"}, {sap: "1002388", name: "SC APC Patches"},
        {sap: "1000289", name: "RJ45 Connector"}, {sap: "1001047", name: "2 Port Faceplate"},
        {sap: "1002445", name: "XGS Zhone Mount"}, {sap: "1002555", name: "Nokia Beacon 19"}
    ];

    function filterMaterials() {
        const input = document.getElementById('matSearch').value.toLowerCase();
        const select = document.getElementById('matSelect');
        select.innerHTML = '';
        materials.filter(m => m.name.toLowerCase().includes(input) || m.sap.includes(input))
                 .forEach(m => {
                     let opt = document.createElement('option');
                     opt.value = `|${m.sap}|, {{${m.name}}}`;
                     opt.textContent = `${m.sap} - ${m.name}`;
                     select.appendChild(opt);
                 });
    }

    function generate() {
        const tech = document.getElementById('techName').value || "N/A";
        const light = document.getElementById('testLight').value || "N/A";
        const ont = document.getElementById('ontModel').value;
        const ontMac = document.getElementById('ontMac').value || "N/A";
        const mat = document.getElementById('matSelect').value || "None selected";
        const notes = document.getElementById('addNotes').value;

        const template = 
`{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Tech: ${tech}
{panel}
{panel:title=Tests Completed:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
Ruby 🚨: ${document.getElementById('testRuby').value}
Light 💡: ${light}
Wifi 🛜: ${document.getElementById('testWifi').value}
{panel}
{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
*ONT Model:* ${ont}
*ONT MAC:* ${ontMac}
*AP Model:* ${document.getElementById('apModel').value}
{panel}
{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
||_SAP_||,_Materials_,||_QTY_||
${mat} | 1
{panel}
{panel:title=Additional Notes:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}
${notes}
{panel}`;

        const out = document.getElementById('output');
        out.innerText = template;
        out.style.display = 'block';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copyNote() {
        navigator.clipboard.writeText(document.getElementById('output').innerText);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "✓ Copied!";
        setTimeout(() => btn.innerText = "Copy to Clipboard", 2000);
    }

    // Initialize list
    filterMaterials();
</script>

</body>
</html>
