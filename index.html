<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Tech Note Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { @apply bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-4; }
        .label-text { @apply block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1; }
        input { @apply w-full p-2 bg-gray-50 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none transition-all; }
        .qty-input { @apply w-16 text-center font-bold text-green-700 bg-white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-24">

    <div class="max-w-2xl mx-auto p-4">
        <header class="py-6 text-center">
            <h1 class="text-2xl font-black text-slate-900 uppercase">Jira Note Gen</h1>
        </header>

        <div class="card">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="label-text">Inside Technician</label>
                    <input type="text" id="tech_inside" placeholder="Enter Name">
                </div>
                <div>
                    <label class="label-text">Outside Technician</label>
                    <input type="text" id="tech_outside" placeholder="Enter Name">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="label-text">ONT Location</label>
                    <input type="text" id="ont_loc" placeholder="Smart Panel">
                </div>
                <div>
                    <label class="label-text">Total Meter (m)</label>
                    <input type="text" id="fiber_total" placeholder="0">
                </div>
            </div>
        </div>

        <div class="card">
            <h3 class="font-bold mb-3 border-b pb-2 text-green-700">Materials Used</h3>
            <input type="text" id="mat_search" onkeyup="filterMaterials()" placeholder="Search SAP or Name..." class="mb-4 bg-white border-green-200 focus:ring-green-300">
            
            <div id="material_list" class="space-y-2 max-h-96 overflow-y-auto pr-2">
                <div class="text-center text-gray-400 py-4 italic">Fetching data.json...</div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t shadow-lg">
            <button onclick="generateNote()" class="w-full max-w-2xl mx-auto block bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg shadow-md uppercase tracking-widest transition-transform active:scale-95">
                Generate & Copy to Clipboard
            </button>
        </div>

        <textarea id="output_box" class="fixed -top-full left-0 opacity-0"></textarea>
    </div>

    <script>
        let allMaterials = [];

        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                allMaterials = data.materials;
                renderMaterials(allMaterials);
            } catch (err) {
                console.error("Error loading JSON:", err);
                document.getElementById('material_list').innerHTML = `<p class="text-red-500">Failed to load data.json</p>`;
            }
        }

        function renderMaterials(list) {
            const container = document.getElementById('material_list');
            container.innerHTML = '';
            list.forEach(item => {
                const row = document.createElement('div');
                row.className = "material-row flex items-center justify-between p-2 hover:bg-green-50 rounded border border-gray-100 transition-colors";
                row.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm font-semibold">${item.name}</span>
                        <span class="text-[10px] text-gray-400 font-mono">${item.sap}</span>
                    </div>
                    <input type="number" value="0" min="0" 
                           data-sap="${item.sap}" data-name="${item.name}" 
                           class="qty-input p-1 border rounded shadow-sm">
                `;
                container.appendChild(row);
            });
        }

        function filterMaterials() {
            const query = document.getElementById('mat_search').value.toLowerCase();
            const filtered = allMaterials.filter(m => 
                m.name.toLowerCase().includes(query) || m.sap.includes(query)
            );
            renderMaterials(filtered);
        }

        function generateNote() {
            const getVal = (id) => document.getElementById(id).value || "N/A";
            
            let note = `{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n`;
            note += `Inside: ${getVal('tech_inside')}\nOutside: ${getVal('tech_outside')}\n{panel}\n\n`;
            
            note += `{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n*ONT Location*: ${getVal('ont_loc')}\n{panel}\n\n`;

            note += `{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\n|| SAP || Materials || QTY ||\n`;
            
            // Collect all inputs including those currently hidden by search
            const allInputs = document.querySelectorAll('.qty-input');
            let hasMaterials = false;
            
            allInputs.forEach(input => {
                const qty = parseInt(input.value);
                if (qty > 0) {
                    note += `|${input.dataset.sap}| ${input.dataset.name} |${qty}|\n`;
                    hasMaterials = true;
                }
            });
            
            if (!hasMaterials) note += `| | No materials recorded | |\n`;
            note += `{panel}\n\n`;

            note += `{panel:title=Fibre Meter Mark:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}\nTotal = ${getVal('fiber_total')}m\n{panel}`;

            const output = document.getElementById('output_box');
            output.value = note;
            output.select();
            document.execCommand('copy');
            
            alert("✅ JIRA Note copied!");
        }

        window.onload = init;
    </script>
</body>
</html>
