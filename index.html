<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Report Master Tool</title>
    <style>
        :root { --bean-green: #93cc94; --jira-blue: #0052cc; --text: #172b4d; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f4f5f7; color: var(--text); padding: 15px; margin: 0; }
        .wrapper { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--bean-green); margin-bottom: 25px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .panel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { border: 1px solid #dfe1e6; border-radius: 5px; padding: 15px; background: #fff; }
        .card h3 { margin-top: 0; font-size: 14px; color: #0747a6; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .input-row { display: flex; flex-direction: column; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; color: #5e6c84; margin-bottom: 4px; }
        input, select { padding: 8px; border: 1px solid #dfe1e6; border-radius: 3px; font-size: 14px; }

        /* Search & Materials */
        #search { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--bean-green); border-radius: 5px; }
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 250px; overflow-y: auto; background: #fafbfc; padding: 10px; border: 1px solid #ddd; }
        .item-btn { text-align: left; background: white; border: 1px solid #ddd; padding: 8px; font-size: 11px; cursor: pointer; border-radius: 3px; display: flex; justify-content: space-between; }
        .item-btn:hover { background: #eef9ee; }

        .active-list { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .mat-item { display: grid; grid-template-columns: 90px 1fr 60px 40px; gap: 8px; margin-bottom: 5px; align-items: center; }
        .del-btn { background: #ff5630; color: white; border: none; padding: 5px; border-radius: 3px; cursor: pointer; }

        /* Output */
        .sticky-actions { position: sticky; bottom: 20px; background: white; padding: 15px; border-top: 2px solid #eee; display: flex; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .btn { padding: 12px 25px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 14px; flex: 1; }
        .btn-gen { background: #36b37e; color: white; }
        .btn-copy { background: var(--jira-blue); color: white; }
        textarea { width: 100%; height: 250px; margin-top: 20px; font-family: 'Courier New', monospace; padding: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h2 style="margin:0">Beanfield Installation Note Generator</h2>
    </header>

    <div class="panel-grid">
        <div class="card">
            <h3>Technician & Network</h3>
            <div class="input-row"><label>Inside Technician</label><input type="text" id="iTech" value="Yuan Tian"></div>
            <div class="input-row"><label>Outside Technician</label><input type="text" id="oTech" value="Jashandeep Singh Sidhu"></div>
            <div class="input-row"><label>Network</label><input type="text" id="net" value="Beanfield"></div>
            <div style="display:flex; gap:10px">
                <div class="input-row" style="flex:1"><label>Start Time</label><input type="time" id="start" value="11:15"></div>
                <div class="input-row" style="flex:1"><label>End Time</label><input type="time" id="end" value="12:00"></div>
            </div>
        </div>

        <div class="card">
            <h3>Hardware Details</h3>
            <div class="input-row"><label>ONT MAC/SN</label><input type="text" id="ontMac"></div>
            <div class="input-row"><label>ONT Model</label><input type="text" id="ontModel" value="Nokia - 10x-R"></div>
            <div class="input-row"><label>AP MAC</label><input type="text" id="apMac"></div>
            <div class="input-row"><label>AP Model</label><input type="text" id="apModel" value="Nokia - Beacon"></div>
        </div>

        <div class="card">
            <h3>Cat5 Termination</h3>
            <div class="input-row"><label>Lines Terminated</label><input type="text" id="catTerm" value="0/9"></div>
            <div class="input-row"><label>Pair Tested</label><input type="text" id="catPair" value="1/9"></div>
            <div class="input-row"><label>Living Room Port</label><input type="text" id="lrPort" value="01"></div>
            <div class="input-row"><label>Return MAC</label><input type="text" id="retMac" placeholder="Zhone MAC"></div>
        </div>

        <div class="card">
            <h3>Riser & Hub</h3>
            <div class="input-row"><label>Floor</label><input type="text" id="floor" value="31"></div>
            <div class="input-row"><label>Panel/Switch</label><input type="text" id="panelSw" value="03"></div>
            <div class="input-row"><label>Port</label><input type="text" id="port" value="35"></div>
            <div class="input-row"><label>Hub Stock Location</label><input type="text" id="hub" value="2206 Eglinton"></div>
        </div>
    </div>

    <div class="card" style="margin-top:20px">
        <h3>Materials List Generator</h3>
        <input type="text" id="search" placeholder="Search SAP or Name (e.g. 'Beacon' or '10023')..." onkeyup="filterItems()">
        <div class="catalog" id="catalog">
            </div>
        <div class="active-list" id="activeItems">
            <label style="display:block; margin-bottom:10px;">Added to Report:</label>
        </div>
    </div>

    <textarea id="output" readonly></textarea>

    <div class="sticky-actions">
        <button class="btn btn-gen" onclick="generateReport()">Generate Full Jira Markup</button>
        <button class="btn btn-copy" onclick="copyReport()">Copy to Clipboard</button>
    </div>
</div>

<script src="materials.js"></script>

<script>
// If materials.js fails to load, fallback to a small internal list
const safeCatalog = typeof materialCatalog !== 'undefined' ? materialCatalog : [
    {name: "Nokia Beacon 19", sap: "1002555", category: "Hardware"},
    {name: "Nokia XS-010X-R", sap: "1002557", category: "Hardware"}
];

function initCatalog() {
    const catDiv = document.getElementById('catalog');
    safeCatalog.forEach(item => {
        const b = document.createElement('button');
        b.className = 'item-btn';
        b.innerHTML = `<span>${item.name}</span> <b style="color:#777">${item.sap}</b>`;
        b.onclick = () => addItem(item.name, item.sap);
        b.setAttribute('data-search', (item.name + item.sap).toLowerCase());
        catDiv.appendChild(b);
    });
}

function filterItems() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.item-btn').forEach(b => {
        b.style.display = b.getAttribute('data-search').includes(q) ? 'flex' : 'none';
    });
}

function addItem(name, sap) {
    const div = document.createElement('div');
    div.className = 'mat-item';
    div.innerHTML = `
        <input type="text" class="m-sap" value="${sap}">
        <input type="text" class="m-name" value="${name}">
        <input type="number" class="m-qty" value="1">
        <button class="del-btn" onclick="this.parentElement.remove()">X</button>
    `;
    document.getElementById('activeItems').appendChild(div);
}

function generateReport() {
    const v = id => document.getElementById(id).value;
    
    // Duration
    const s = v('start').split(':'), e = v('end').split(':');
    let ms = (new Date(0,0,0,e[0],e[1])).getTime() - (new Date(0,0,0,s[0],s[1])).getTime();
    if (ms < 0) ms += 86400000;
    const dur = `${Math.floor(ms/3600000)}:${Math.floor((ms%3600000)/60000).toString().padStart(2,'0')}:00`;

    // Materials
    let matMarkup = "";
    const saps = document.querySelectorAll('.m-sap'), names = document.querySelectorAll('.m-name'), qtys = document.querySelectorAll('.m-qty');
    saps.forEach((s, i) => {
        matMarkup += `|${s.value}|	{{${names[i].value}}}	|${qtys[i].value.toString().padStart(2, '0')}|	\n`;
    });

    const note = `{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Inside:	${v('iTech')} 		
Outside:	${v('oTech')} 		
{panel}			
{panel:title=Network:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
${v('net')}			
{panel}			
{panel:title=Tests Completed:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Ruby 🚨:	Yes | Light 💡:	Yes | EXFO 📲:	Yes | Wifi 🛜:	Yes | Pair Test:	Yes		
{panel}			
{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
*ONT Location*: Smart Panel | *ONT MAC/SN*: ${v('ontMac')} | ONT Model: ${v('ontModel')}
*AP Location*: Living Room | *AP MAC*: ${v('apMac')} | AP Model: ${v('apModel')}			
{panel}			
{panel:title=Cat5 Termination:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Lines Terminated: ${v('catTerm')} | Pair Tested: ${v('catPair')}
_Location(s):_ Living Room 🛋️: ${v('lrPort')}			
_Customer Notified of $100 Charge for Return?_ Yes			
{panel}			
{panel:title=Riser Info:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Floor: ${v('floor')} | Panel/Switch: ${v('panelSw')} | Port: ${v('port')}			
{panel}			
{panel:title=Time on Site:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
* Start Time: ${v('start')} | * End Time: ${v('end')} | *Total: ${dur}		
{panel}			
{panel:title=Hub Stock Location:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Location: ${v('hub')} 		
{panel}			
{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
||_SAP_||	_Materials_	||_QTY_||	
${matMarkup}{panel}			
{panel:title=Additional Notes:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Hardware Return Mac: ${v('retMac')} [~res-orders]		
{panel}`;

    document.getElementById('output').value = note;
}

function copyReport() {
    const o = document.getElementById('output');
    o.select(); document.execCommand('copy');
    alert("Report Copied to Clipboard!");
}

initCatalog();
</script>
</body>
</html>

<div class="container">
    <div class="controls">
        <button class="primary btn-gen" onclick="generateMarkup()">Generate Full Report</button>
        <button class="primary btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>

    <div class="section">
        <h3>1. Tech & Time</h3>
        <div class="grid">
            <div class="field-group"><label>Inside Tech</label><input type="text" id="iTech" value="Yuan Tian"></div>
            <div class="field-group"><label>Outside Tech</label><input type="text" id="oTech" value="Jashandeep Singh Sidhu"></div>
            <div class="field-group"><label>Start Time</label><input type="time" id="startTime" value="11:15"></div>
            <div class="field-group"><label>End Time</label><input type="time" id="endTime" value="12:00"></div>
            <div class="field-group"><label>Hub Location</label><input type="text" id="hub" value="2206 Eglinton"></div>
        </div>
    </div>

    <div class="section">
        <h3>2. Install & Riser Info</h3>
        <div class="grid">
            <div class="field-group"><label>ONT MAC</label><input type="text" id="ontMac" placeholder="ALCL..."></div>
            <div class="field-group"><label>AP MAC</label><input type="text" id="apMac" placeholder="84:6E..."></div>
            <div class="field-group"><label>Floor</label><input type="text" id="floor" value="31"></div>
            <div class="field-group"><label>Panel/Switch</label><input type="text" id="panelSw" value="03"></div>
            <div class="field-group"><label>Port</label><input type="text" id="port" value="35"></div>
            <div class="field-group"><label>Return MAC</label><input type="text" id="retMac" placeholder="0002..."></div>
        </div>
    </div>

    <div class="section">
        <h3>3. Cat5 Termination</h3>
        <div class="grid">
            <div class="field-group"><label>Lines Terminated</label><input type="text" id="catTerm" value="0/9"></div>
            <div class="field-group"><label>Pair Tested</label><input type="text" id="catPair" value="1/9"></div>
            <div class="field-group"><label>Plugged to Beacon</label><input type="text" id="plugBeacon" value="0/9"></div>
            <div class="field-group"><label>Plugged to Zhone</label><input type="text" id="plugZhone" value="1/9"></div>
            <div class="field-group"><label>Living Room Port</label><input type="text" id="lrPort" value="01"></div>
        </div>
    </div>

    <div class="section">
        <h3>4. Material List</h3>
        <input type="text" id="catSearch" placeholder="Search by item name or SAP code..." onkeyup="filterCatalog()">
        <div class="catalog-box" id="catalogBody"></div>
        <div id="activeMaterials" style="margin-top:15px; border-top: 1px solid #eee; padding-top:10px;">
            <label style="display:block; margin-bottom:10px;">Selected Items:</label>
        </div>
    </div>

    <textarea id="output" readonly placeholder="Your formatted Jira text will appear here..."></textarea>
</div>

<script>
// Your complete material list
const materials = [
    // Copper
    {n:"RJ45 Connector", s:"1000289"}, {n:"2 Port Faceplate", s:"1001047"}, {n:"4 Port Faceplate", s:"1001048"},
    {n:"White Jacks", s:"1000520"}, {n:"Coax Insert", s:"1001049"}, {n:"3ft CAT5 Patch Cable", s:"1000254"},
    {n:"5ft CAT5 Patch Cable", s:"1000497"}, {n:"10ft CAT5 Patch Cable", s:"1000253"},
    // Fibre
    {n:"Fibre Jack", s:"1002322"}, {n:"Heat Sleeve 40mm", s:"1000526"}, {n:"LC APC Connector", s:"1001083"},
    {n:"SC APC SC APC Patches", s:"1002388"}, {n:"LC APC LC APC Patches", s:"1002335"}, {n:"Heat Sleeve 25mm", s:"1002592"},
    {n:"Heat Sleeve 50mm", s:"1002593"}, {n:"APC LC APC SC Patches", s:"1002597"}, {n:"SC APC Connector", s:"1001084"},
    {n:"LC UPC 250/900", s:"1000422"}, {n:"SC UPC", s:"1000476"}, {n:"APC Bulk Heads", s:"1001079"}, {n:"UPC Bulk Heads", s:"1000461"},
    // Hardware
    {n:"5222XG Zhone", s:"1002324"}, {n:"2424GN Zhone", s:"1002327"}, {n:"2424A1 Zhone", s:"1001199"},
    {n:"2424A Zhone", s:"100446"}, {n:"2628A Zhone", s:"1001087"}, {n:"8 port GPON zhone", s:"1001204"},
    {n:"Nokia Beacon 19", s:"1002555"}, {n:"Nokia XS-010X-R", s:"1002557"}, {n:"Airties 4960x", s:"1002344"},
    {n:"Airties 4960", s:"1002207"}, {n:"Archer C20 (100MBS)", s:"1002407"}, {n:"TP LINK ARCHER AX23", s:"1002481"}, {n:"SML TV Box", s:"1001554"},
    // Other
    {n:"A1 Zhone Mount", s:"1000420"}, {n:"XGS / 2424GN Zhone Mount", s:"1002445"}, {n:"Nokia ONT Mount - Factory", s:"1002573"},
    {n:"Nokia VOIP ONT mount - Factory", s:"1002572"}, {n:"Nokia ONT Mount - Custom", s:"1002589"}, {n:"Nokia VOIP ONT mount - Custom", s:"1002590"},
    {n:"RJ11 Splitter (Dongle)", s:"1000501"}, {n:"HDMI Cable 6'", s:"1000952"}, {n:"Power Extension", s:"1001208"}
];

function initCatalog() {
    const container = document.getElementById('catalogBody');
    materials.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'item-btn';
        btn.innerHTML = `<span>${item.n}</span> <span style="color:#888">${item.s}</span>`;
        btn.setAttribute('data-search', (item.n + item.s).toLowerCase());
        btn.onclick = () => addMaterial(item.n, item.s);
        container.appendChild(btn);
    });
}

function filterCatalog() {
    const q = document.getElementById('catSearch').value.toLowerCase();
    const btns = document.getElementsByClassName('item-btn');
    for (let b of btns) { b.style.display = b.getAttribute('data-search').includes(q) ? "flex" : "none"; }
}

function addMaterial(name, sap) {
    const div = document.createElement('div');
    div.className = 'mat-row';
    div.innerHTML = `<input type="text" class="m-sap" value="${sap}"><input type="text" class="m-name" value="${name}"><input type="number" class="m-qty" value="1"><button class="btn-del" onclick="this.parentElement.remove()">X</button>`;
    document.getElementById('activeMaterials').appendChild(div);
}

function generateMarkup() {
    const v = (id) => document.getElementById(id).value;
    
    // Time Calculation
    const start = v('startTime').split(':'), end = v('endTime').split(':');
    let ms = (new Date(0,0,0,end[0],end[1])).getTime() - (new Date(0,0,0,start[0],start[1])).getTime();
    if (ms < 0) ms += 86400000;
    const dur = `${Math.floor(ms/3600000)}:${Math.floor((ms%3600000)/60000).toString().padStart(2,'0')}:00`;

    // Materials Loop
    let matMarkup = "";
    const saps = document.getElementsByClassName('m-sap'), names = document.getElementsByClassName('m-name'), qtys = document.getElementsByClassName('m-qty');
    for(let i=0; i<saps.length; i++) {
        matMarkup += `|${saps[i].value}|	{{${names[i].value}}}	|${qtys[i].value.toString().padStart(2,'0')}|	\n`;
    }

    const template = `{panel:title=Technician(s):|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Inside:	${v('iTech')} 		
Outside:	${v('oTech')} 		
{panel}			
{panel:title=Network:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Beanfield			
{panel}			
{panel:title=Tests Completed:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Ruby 🚨:	Yes		
Light 💡:	Yes		
EXFO 📲:	Yes		
Wifi 🛜:	Yes		
Pair Test:	Yes		
{panel}			
{panel:title=Installation Details:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
*ONT Location*:	Smart Panel		
*ONT MAC/SN*:	${v('ontMac')}		
ONT Model: 	Nokia - 10x-R		
*AP Location*: 	Living Room		
*AP MAC*:	${v('apMac')}		
AP Model:	Nokia - Beacon		
_If the Airties/Beacon was left in the closet, was the customer advised of possible issues with coverage?_			
N/A			
{panel}			
{panel:title=Cat5 Termination:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Lines Terminated:	${v('catTerm')}		
Pair Tested:	${v('catPair')}		
Plugged into the Beacon:	${v('plugBeacon')}		
Plugged into the Zhone:	${v('plugZhone')}		
_Location(s):_			
Living Room 🛋️:	${v('lrPort')}		
Bedroom #1🛏️:			
Bedroom #2🛏️:			
Den/Office 📁:			
Kitchen 🧑‍🍳:			
_Was the Customer Notified of $100 Charge for a Return Visit ?_			
Yes			
{panel}			
{panel:title=Riser Info:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Floor:	${v('floor')}		
Panel:/Switch	${v('panelSw')}		
Port:	${v('port')}		
{panel}			
{panel:title=Fibre Meter Mark:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Pre Wired:	Yes		
Riser =			
Suite =			
Total =	 m		
{panel}			
{panel:title=Time on Site:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
* Start Time:	${v('startTime')}		
* End Time:	${v('endTime')}		
*Time on Site:	${dur}		
{panel}			
{panel:title=Hub Stock Location:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Location:	${v('hub')} 		
{panel}			
{panel:title=Material List:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
||_SAP_||	_Materials_	||_QTY_||	
${matMarkup}
{panel}			
{panel:title=Additional Notes:|borderStyle=solid|borderColor=#000|titleBGColor=#93cc94}			
Hardware Return:			
Mac: ${v('retMac')}			
	[~res-orders]		
{panel}`;

    document.getElementById('output').value = template;
}

function copyToClipboard() {
    const o = document.getElementById("output"); o.select(); document.execCommand("copy"); alert("Report Copied!");
}

window.onload = initCatalog;
</script>
</body>
</html>
